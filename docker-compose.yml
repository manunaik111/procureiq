version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: procureiq_postgres
    environment:
      POSTGRES_USER: procureiq
      POSTGRES_PASSWORD: procureiq123
      POSTGRES_DB: procureiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis/redis-stack:latest
    container_name: procureiq_redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: